<!-- Script para gerenciar estado do usuário na navbar -->
<script>
(function() {
    'use strict';
    
    // Atualizar navbar baseado no status de autenticação
    function updateNavbarAuth() {
        const userMenu = document.getElementById('userMenu');
        if (!userMenu) return;
        
        // Obter token e usuário
        const token = localStorage.getItem('bloom_token') || sessionStorage.getItem('bloom_token');
        let usuario = null;
        
        try {
            const userStr = localStorage.getItem('bloom_user') || sessionStorage.getItem('bloom_user');
            if (userStr) {
                usuario = JSON.parse(userStr);
            }
        } catch (e) {
            console.error('Erro ao parsear usuário:', e);
        }
        
        if (token && usuario && usuario.id) {
            // Usuário logado - mostrar menu do usuário
            userMenu.innerHTML = `
                <div class="dropdown">
                    <button class="btn btn-outline-pink rounded-pill dropdown-toggle d-flex align-items-center gap-2 px-3 py-2" 
                            type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle fs-5"></i>
                        <span class="d-none d-md-inline">Olá, ${usuario.nome?.split(' ')[0] || 'Paciente'}!</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg rounded-3 mt-2" style="min-width: 220px;">
                        <li><a class="dropdown-item py-2" href="meus-agendamentos.html">
                            <i class="bi bi-calendar-check me-2"></i> Meus Agendamentos
                        </a></li>
                        <li><a class="dropdown-item py-2" href="meus-agendamentos.html">
                            <i class="bi bi-file-text me-2"></i> Meus Exames
                        </a></li>
                        <li><a class="dropdown-item py-2" href="meu-perfil.html">
                            <i class="bi bi-gear me-2"></i> Meu Perfil
                        </a></li>
                        ${(usuario.tipo_usuario === 'admin' || usuario.is_admin) ? `<li><a class="dropdown-item py-2" href="admin-painel.html"><i class="bi bi-speedometer2 me-2"></i> Painel Admin</a></li>` : ''}
                        <li><hr class="dropdown-divider my-1"></li>
                        <li><a class="dropdown-item py-2 text-danger" href="#" onclick="logout(); return false;">
                            <i class="bi bi-box-arrow-right me-2"></i> Sair
                        </a></li>
                    </ul>
                </div>
                <a href="agendamento.html" class="btn btn-gradient rounded-pill d-none d-lg-flex align-items-center gap-2 px-4">
                    <i class="bi bi-calendar-heart"></i> 
                    <span>Agendar</span>
                </a>
            `;
        } else {
            // Usuário não logado - mostrar botões de login/cadastro
            userMenu.innerHTML = `
                <a href="login.html" class="btn btn-outline-pink rounded-pill px-4 py-2">
                    <i class="bi bi-box-arrow-in-right"></i> Entrar
                </a>
                <a href="cadastro.html" class="btn btn-gradient rounded-pill px-4 py-2">
                    <i class="bi bi-person-plus"></i> Cadastrar
                </a>
            `;
        }
    }
    
    // Função global de logout
    window.logout = function() {
        // Remover dados de autenticação
        localStorage.removeItem('bloom_token');
        localStorage.removeItem('bloom_user');
        localStorage.removeItem('bloom_user_id');
        sessionStorage.removeItem('bloom_token');
        sessionStorage.removeItem('bloom_user');
        sessionStorage.removeItem('bloom_user_id');
        
        // Mostrar mensagem
        if (window.showToast) {
            window.showToast('Logout realizado com sucesso!', 'success');
        } else {
            alert('Logout realizado com sucesso!');
        }
        
        // Redirecionar para home
        window.location.href = 'index.html';
    };
    
    // Função global de verificação de login
    window.isLoggedIn = function() {
        const token = localStorage.getItem('bloom_token') || sessionStorage.getItem('bloom_token');
        return !!token;
    };
    
    // Inicializar quando o DOM estiver pronto
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', updateNavbarAuth);
    } else {
        updateNavbarAuth();
    }
    
    // Escutar mudanças no storage (para múltiplas abas)
    window.addEventListener('storage', function(e) {
        if (e.key === 'bloom_token' || e.key === 'bloom_user') {
            updateNavbarAuth();
        }
    });
})();
</script>
